version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/api/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # envsubst replaces ${DOMAIN} in nginx.conf.template at container start
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - convomem-net
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew certs every 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./apps/api/.env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://convomem:${POSTGRES_PASSWORD}@postgres:5432/convomem_db
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    networks:
      - convomem-net
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convomem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: convomem_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convomem -d convomem_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - convomem-net
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.10.0
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - convomem-net
    restart: always

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - convomem-net
    restart: always

volumes:
  postgres-data:
  qdrant-data:
  valkey-data:

networks:
  convomem-net:
    driver: bridge
