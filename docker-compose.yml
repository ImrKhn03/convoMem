services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://convomem:convomem@postgres:5432/convomem_db
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_started
    networks:
      - convomem-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convomem
      POSTGRES_PASSWORD: convomem
      POSTGRES_DB: convomem_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convomem -d convomem_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - convomem-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.0
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - convomem-net
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey-data:/data
    networks:
      - convomem-net
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  valkey-data:

networks:
  convomem-net:
    driver: bridge