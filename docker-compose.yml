services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
      - PORT=8000
      - DATABASE_URL=postgresql://convomem:convomem@host.docker.internal:5432/convomem_db
      - QDRANT_URL=http://host.docker.internal:6333
      - REDIS_URL=redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  valkey-data:
